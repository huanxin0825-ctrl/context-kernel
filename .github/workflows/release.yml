name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts after validation."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      target:
        description: "Publish target when publish=true."
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "github-release"
          - "python"
          - "npm"
      release_tag:
        description: "Release tag for manual github-release runs, for example v0.1.0."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  python-package:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            args+=(--strict-release --tag "${GITHUB_REF_NAME}")
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.publish }}" == "true" ]]; then
            if [[ -z "${{ github.event.inputs.release_tag }}" ]]; then
              echo "release_tag must be set when publishing manually." >&2
              exit 1
            fi
            args+=(--strict-release --tag "${{ github.event.inputs.release_tag }}")
          fi
          python scripts/release_guard.py "${args[@]}"

      - name: Build package
        run: python -m build

      - name: Verify source distribution contents
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          archives = sorted(Path("dist").glob("akernel_runtime-*.tar.gz"))
          if len(archives) != 1:
              raise SystemExit(f"expected one source distribution, found {len(archives)}")
          with tarfile.open(archives[0], "r:gz") as tar:
              names = set(tar.getnames())
          root = archives[0].name.removesuffix(".tar.gz")
          required = [
              f"{root}/scripts/install_smoke.py",
              f"{root}/scripts/release_guard.py",
          ]
          missing = [name for name in required if name not in names]
          if missing:
              raise SystemExit(f"missing source distribution files: {missing}")
          print("source distribution scripts: ok")
          PY

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          python -m pip install dist/*.whl
          akernel --help
          python scripts/install_smoke.py --command akernel

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

  npm-package:
    name: Pack npm Launcher
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate npm package
        working-directory: packages/npm/akernel
        run: npm pack --dry-run

      - name: Smoke npm launcher
        working-directory: packages/npm/akernel
        run: npm run smoke

  benchmark-evidence:
    name: Build Benchmark Evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Prepare benchmark workspace
        run: |
          python -m context_kernel.cli --workspace .release-bench init .release-bench
          python -m context_kernel.cli --workspace .release-bench skill register examples/skills/edit_file.json
          python -m context_kernel.cli --workspace .release-bench skill register examples/skills/context_budget.json
          python -m context_kernel.cli --workspace .release-bench memory add --kind preference --text "Prefer CLI-first context budget prototypes." --tags cli

      - name: Run benchmark scale suite
        run: python -m context_kernel.cli --workspace .release-bench bench run examples/benchmarks/scale

      - name: Export benchmark evidence
        run: python -m context_kernel.cli --workspace .release-bench bench evidence --limit 1 --fail-under 30 --output .release-bench/benchmark-evidence.md

      - name: Upload benchmark evidence
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-evidence
          path: |
            .release-bench/benchmark-evidence.md
            .release-bench/benchmarks/*.json

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [python-package, npm-package, benchmark-evidence]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.publish == 'true' &&
        (
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == 'github-release'
        )
      )
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.release_tag || github.ref_name }}"
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "release_tag must be set for manual GitHub release runs." >&2
            exit 1
          fi
          notes=".github/release-notes/${tag}.md"
          if [ ! -f "$notes" ]; then
            echo "Missing release notes: $notes" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: Context Kernel ${{ steps.release_notes.outputs.tag }}
          body_path: ${{ steps.release_notes.outputs.notes }}
          prerelease: true

  publish-pypi:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs: [python-package, npm-package, benchmark-evidence]
    if: |
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
      ) && (
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.target != 'npm'
      )
    permissions:
      id-token: write
      contents: read
    environment: pypi

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish npm Launcher
    runs-on: ubuntu-latest
    needs: [python-package, npm-package, benchmark-evidence]
    if: |
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
      ) && (
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.target != 'python'
      ) && vars.PUBLISH_NPM == 'true'
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish npm package
        working-directory: packages/npm/akernel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
