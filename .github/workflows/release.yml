name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts after validation."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  python-package:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .release-smoke
          . .release-smoke/bin/activate
          python -m pip install dist/*.whl
          akernel --help

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  npm-package:
    name: Pack npm Launcher
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate npm package
        working-directory: packages/npm/akernel
        run: npm pack --dry-run

  publish-pypi:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs: [python-package, npm-package]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    permissions:
      id-token: write
      contents: read
    environment: pypi

    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish Python package
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish npm Launcher
    runs-on: ubuntu-latest
    needs: [python-package, npm-package]
    if: (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true') && vars.PUBLISH_NPM == 'true'
    permissions:
      contents: read
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish npm package
        working-directory: packages/npm/akernel
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
